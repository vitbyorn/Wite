<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎹 Синтезатор + Загрузчик звуков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: #111;
            border: 2px solid #00ffcc;
            border-radius: 16px;
            padding: 20px;
        }
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }
        .status-bar {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-bar .status {
            color: #888;
            font-size: 13px;
        }
        .status-bar .status .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-bar .status .dot.inactive {
            background: #ff4444;
        }
        .status-bar .status .dot.active {
            background: #00ff88;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        .btn-activate {
            background: #ff8800;
            color: #000;
            padding: 5px 18px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-activate:hover {
            background: #ffaa33;
        }
        .btn-activate.active {
            background: #00cc88;
        }

        /* ЗАГРУЗЧИК */
        .upload-section {
            background: #1a1a1a;
            border: 2px dashed #444;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            transition: border-color 0.3s;
        }
        .upload-section:hover {
            border-color: #00ffcc;
        }
        .upload-section .file-input-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .upload-section input[type="file"] {
            display: none;
        }
        .upload-section .file-label {
            background: #334466;
            color: #fff;
            padding: 8px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .upload-section .file-label:hover {
            background: #446688;
        }
        .upload-section .file-name {
            color: #888;
            font-size: 13px;
        }
        .upload-section .file-name.loaded {
            color: #00ff88;
        }
        .upload-section .btn-play-file {
            background: #00cc88;
            color: #000;
            padding: 6px 20px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
        }
        .upload-section .btn-play-file:hover {
            background: #00ffaa;
        }
        .upload-section .btn-play-file.show {
            display: inline-block;
        }

        /* Файловые настройки */
        .file-controls {
            display: none;
            margin-top: 12px;
            padding: 12px;
            background: #0d0d0d;
            border-radius: 8px;
            border: 1px solid #333;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .file-controls.show {
            display: flex;
        }
        .file-controls .row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-controls .row label {
            color: #aaa;
            font-size: 12px;
        }
        .file-controls .row input[type="range"] {
            width: 100px;
            background: #222;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            border-radius: 2px;
            cursor: pointer;
        }
        .file-controls .row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
        }
        .file-controls .row .value {
            color: #00ffcc;
            font-size: 12px;
            min-width: 35px;
            text-align: right;
        }
        .file-controls .row input[type="checkbox"] {
            accent-color: #00ffcc;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .sound-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .sound-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 14px;
            transition: border-color 0.2s;
        }
        .sound-card:hover {
            border-color: #00ffcc;
        }
        .sound-card .label {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }
        .sound-card .desc {
            color: #888;
            font-size: 11px;
            margin-bottom: 10px;
        }
        .sound-card .controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .sound-card .controls .row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .sound-card .controls .row label {
            color: #aaa;
            font-size: 11px;
            min-width: 55px;
        }
        .sound-card .controls .row input[type="range"] {
            flex: 1;
            min-width: 60px;
            background: #222;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            border-radius: 2px;
            cursor: pointer;
        }
        .sound-card .controls .row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
        }
        .sound-card .controls .row .value {
            color: #00ffcc;
            font-size: 11px;
            min-width: 45px;
            text-align: right;
        }
        .sound-card .controls .row select {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 3px 6px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
        }
        .sound-card .controls .row select:focus {
            outline: none;
            border-color: #00ffcc;
        }
        .btn-group {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .btn {
            padding: 5px 14px;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            background: #222;
            color: #fff;
        }
        .btn-play {
            background: #00cc88;
            color: #000;
        }
        .btn-play:hover {
            background: #00ffaa;
            transform: scale(1.02);
        }
        .btn-copy {
            background: #334466;
            color: #fff;
        }
        .btn-copy:hover {
            background: #446688;
        }
        .btn-copy.copied {
            background: #00cc88;
            color: #000;
        }
        .btn-file-code {
            background: #8844aa;
            color: #fff;
        }
        .btn-file-code:hover {
            background: #aa66cc;
        }

        .code-output {
            margin-top: 18px;
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px;
        }
        .code-output .code-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .code-output pre {
            color: #88ddff;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            max-height: 120px;
            overflow-y: auto;
            margin: 0;
            padding: 6px;
            background: #0a0a0a;
            border-radius: 6px;
            border: 1px solid #1a1a1a;
        }
        .code-output pre::-webkit-scrollbar {
            width: 4px;
        }
        .code-output pre::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }
        .btn-copy-all {
            background: #00cc88;
            color: #000;
            padding: 4px 16px;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-copy-all:hover {
            background: #00ffaa;
        }
        .btn-copy-all.copied {
            background: #ffcc00;
        }
        .note {
            color: #666;
            font-size: 11px;
            margin-top: 12px;
            text-align: center;
            border-top: 1px solid #1a1a1a;
            padding-top: 12px;
        }
        @media (max-width: 700px) {
            .sound-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 12px;
            }
            .file-controls .row {
                flex: 1 1 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎹 СИНТЕЗАТОР + ЗАГРУЗЧИК</h1>
        <div class="subtitle">NeonPongFight — 8-битные звуки + свои звуки</div>

        <div class="status-bar">
            <div class="status" id="audioStatus">
                <span class="dot inactive" id="statusDot"></span>
                <span id="statusText">🔇 Аудио не активировано</span>
            </div>
            <button class="btn-activate" id="activateBtn">🔊 Активировать</button>
        </div>

        <!-- ===== ЗАГРУЗЧИК ФАЙЛОВ ===== -->
        <div class="upload-section">
            <div class="file-input-wrap">
                <label class="file-label" for="soundFileInput">📁 Выбрать звуковой файл</label>
                <input type="file" id="soundFileInput" accept=".wav,.mp3,.ogg,.aac,.flac">
                <span class="file-name" id="fileName">Файл не выбран</span>
                <button class="btn-play-file" id="playFileBtn">▶ Play</button>
                <button class="btn btn-file-code" id="fileCodeBtn" style="display:none;">📋 Код</button>
            </div>
            <div class="file-controls" id="fileControls">
                <div class="row">
                    <label>Громкость</label>
                    <input type="range" min="0" max="1" step="0.05" value="0.5" id="fileVolume">
                    <span class="value" id="fileVolumeVal">0.50</span>
                </div>
                <div class="row">
                    <label>Скорость</label>
                    <input type="range" min="0.1" max="3" step="0.05" value="1" id="fileRate">
                    <span class="value" id="fileRateVal">1.00</span>
                </div>
                <div class="row">
                    <label>Зациклить</label>
                    <input type="checkbox" id="fileLoop">
                </div>
            </div>
        </div>

        <div class="sound-grid" id="soundGrid"></div>

        <div class="code-output">
            <div class="code-label">
                <span>📋 Код для вставки в игру</span>
                <button class="btn-copy-all" id="copyAllBtn">📋 Копировать всё</button>
            </div>
            <pre id="codeOutput">// Настрой звук и нажми "Копировать"</pre>
        </div>

        <div class="note">▶ Play — послушать · 📋 Код — взять готовую функцию для вставки в игру</div>
    </div>

    <script>
        // ============================================================
        //  ЯДРО СИНТЕЗАТОРА
        // ============================================================
        const Synth = (function() {
            let ctx = null;
            let active = false;

            function init() {
                if (!ctx) {
                    try {
                        ctx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) { return false; }
                }
                if (ctx.state === 'suspended') ctx.resume();
                active = (ctx.state === 'running');
                updateUI();
                return active;
            }

            function updateUI() {
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                const btn = document.getElementById('activateBtn');
                if (active) {
                    dot.className = 'dot active';
                    text.textContent = '🔊 Аудио готово';
                    if (btn) { btn.textContent = '✅ Готово';
                        btn.className = 'btn-activate active'; }
                } else {
                    dot.className = 'dot inactive';
                    text.textContent = '🔇 Нажми "Активировать"';
                    if (btn) { btn.textContent = '🔊 Активировать';
                        btn.className = 'btn-activate'; }
                }
            }

            function play(freq, dur, type, vol) {
                if (!active) init();
                if (!ctx || ctx.state !== 'running') return;
                try {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type || 'square';
                    osc.frequency.value = freq || 440;
                    gain.gain.value = vol || 0.25;
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + (dur || 0.1));
                } catch (e) { /* тихо */ }
            }

            // Для загруженных файлов
            let audioBuffer = null;
            let fileSource = null;

            function loadFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            if (!ctx) init();
                            const arrayBuffer = e.target.result;
                            audioBuffer = await ctx.decodeAudioData(arrayBuffer);
                            resolve(audioBuffer);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = reject;
                    reader.readAsArrayBuffer(file);
                });
            }

            function playFile(volume = 0.5, rate = 1, loop = false) {
                if (!audioBuffer || !ctx) return;
                if (!active) init();
                if (ctx.state !== 'running') return;
                try {
                    if (fileSource) {
                        try { fileSource.stop(); } catch (e) {}
                        fileSource = null;
                    }
                    fileSource = ctx.createBufferSource();
                    fileSource.buffer = audioBuffer;
                    fileSource.loop = loop;
                    fileSource.playbackRate.value = rate;

                    const gain = ctx.createGain();
                    gain.gain.value = volume;
                    fileSource.connect(gain);
                    gain.connect(ctx.destination);
                    fileSource.start();
                } catch (e) { /* тихо */ }
            }

            function stopFile() {
                if (fileSource) {
                    try { fileSource.stop(); } catch (e) {}
                    fileSource = null;
                }
            }

            function getBuffer() { return audioBuffer; }

            document.addEventListener('click', () => { if (!active) init(); }, { once: true });
            document.addEventListener('touchstart', () => { if (!active) init(); }, { once: true });

            return {
                init,
                play,
                loadFile,
                playFile,
                stopFile,
                getBuffer,
                isActive: () => active,
                updateUI,
                getCtx: () => ctx
            };
        })();

        // ============================================================
        //  КОНФИГ ПРЕСЕТОВ
        // ============================================================
        const PRESETS = [
            { id: 'hitPlayer', label: 'Бац!', emoji: '🏓', desc: 'Удар по игроку', f: 880, d: 0.12, t: 'square',
            v: 0.35 },
            { id: 'hitAI', label: 'Боц!', emoji: '🤖', desc: 'Удар по AI', f: 660, d: 0.12, t: 'square', v: 0.35 },
            { id: 'wall', label: 'Тык!', emoji: '🧱', desc: 'Удар об стену', f: 440, d: 0.08, t: 'square', v: 0.25 },
            { id: 'goalPlayer', label: 'Дзынь!', emoji: '⚡', desc: 'Гол', f: 1200, d: 0.25, t: 'square', v: 0.4 },
            { id: 'goalAI', label: 'Пыщ!', emoji: '💥', desc: 'Гол себе', f: 300, d: 0.25, t: 'square', v: 0.4 },
            { id: 'boost', label: 'Вау!', emoji: '🚀', desc: 'Ускорение', f: 1000, d: 0.15, t: 'square', v: 0.3 },
            { id: 'slow', label: 'Вух!', emoji: '🐢', desc: 'Замедление', f: 280, d: 0.2, t: 'square', v: 0.25 },
            { id: 'spin', label: 'Вжжик!', emoji: '🌀', desc: 'Закрутка', f: 750, d: 0.18, t: 'sawtooth', v: 0.2 },
            { id: 'spark', label: 'Трень-динь!', emoji: '✨', desc: 'Искры (3 звука)', f: 1400, d: 0.06, t: 'square',
                v: 0.2 }
        ];

        // ============================================================
        //  СОСТОЯНИЕ
        // ============================================================
        const state = {};
        PRESETS.forEach(p => {
            state[p.id] = { freq: p.f, duration: p.d, type: p.t, volume: p.v };
        });

        // ============================================================
        //  РЕНДЕР КАРТОЧЕК
        // ============================================================
        const grid = document.getElementById('soundGrid');

        PRESETS.forEach(p => {
            const s = state[p.id];
            const card = document.createElement('div');
            card.className = 'sound-card';
            card.innerHTML = `
                <div class="label"><span>${p.emoji} ${p.label}</span></div>
                <div class="desc">${p.desc}</div>
                <div class="controls">
                    <div class="row">
                        <label>Hz</label>
                        <input type="range" min="100" max="2000" step="10" value="${s.freq}" 
                               data-id="${p.id}" data-param="freq">
                        <span class="value" id="val-${p.id}-freq">${s.freq}</span>
                    </div>
                    <div class="row">
                        <label>Длит</label>
                        <input type="range" min="0.02" max="0.6" step="0.01" value="${s.duration}"
                               data-id="${p.id}" data-param="duration">
                        <span class="value" id="val-${p.id}-duration">${s.duration.toFixed(2)}</span>
                    </div>
                    <div class="row">
                        <label>Гром</label>
                        <input type="range" min="0.05" max="0.8" step="0.05" value="${s.volume}"
                               data-id="${p.id}" data-param="volume">
                        <span class="value" id="val-${p.id}-volume">${s.volume.toFixed(2)}</span>
                    </div>
                    <div class="row">
                        <label>Волна</label>
                        <select data-id="${p.id}" data-param="type">
                            <option value="sine" ${s.type==='sine'?'selected':''}>sine</option>
                            <option value="square" ${s.type==='square'?'selected':''}>square</option>
                            <option value="sawtooth" ${s.type==='sawtooth'?'selected':''}>sawtooth</option>
                            <option value="triangle" ${s.type==='triangle'?'selected':''}>triangle</option>
                        </select>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-play" data-id="${p.id}">▶ Play</button>
                    <button class="btn btn-copy" data-id="${p.id}">📋 Код</button>
                </div>
            `;
            grid.appendChild(card);
        });

        // ============================================================
        //  СОБЫТИЯ ДЛЯ КАРТОЧЕК
        // ============================================================
        document.getElementById('activateBtn').onclick = () => {
            Synth.init();
            Synth.updateUI();
        };

        document.querySelectorAll('.sound-card input[type="range"]').forEach(inp => {
            inp.oninput = function() {
                const id = this.dataset.id;
                const param = this.dataset.param;
                const val = parseFloat(this.value);
                state[id][param] = val;
                const el = document.getElementById(`val-${id}-${param}`);
                if (el) el.textContent = param === 'duration' ? val.toFixed(2) : val;
            };
        });

        document.querySelectorAll('.sound-card select').forEach(sel => {
            sel.onchange = function() {
                state[this.dataset.id][this.dataset.param] = this.value;
            };
        });

        document.querySelectorAll('.btn-play').forEach(btn => {
            btn.onclick = function() {
                Synth.init();
                const id = this.dataset.id;
                const s = state[id];
                if (id === 'spark') {
                    Synth.play(s.freq, s.duration, s.type, s.volume);
                    setTimeout(() => Synth.play(s.freq * 0.78, s.duration * 1.2, s.type, s.volume * 0.9), 80);
                    setTimeout(() => Synth.play(s.freq * 0.57, s.duration * 1.4, s.type, s.volume * 0.8), 180);
                } else {
                    Synth.play(s.freq, s.duration, s.type, s.volume);
                }
            };
        });

        // ============================================================
        //  ЗАГРУЗКА ФАЙЛОВ
        // ============================================================
        const fileInput = document.getElementById('soundFileInput');
        const fileName = document.getElementById('fileName');
        const playFileBtn = document.getElementById('playFileBtn');
        const fileCodeBtn = document.getElementById('fileCodeBtn');
        const fileControls = document.getElementById('fileControls');
        const fileVolume = document.getElementById('fileVolume');
        const fileVolumeVal = document.getElementById('fileVolumeVal');
        const fileRate = document.getElementById('fileRate');
        const fileRateVal = document.getElementById('fileRateVal');
        const fileLoop = document.getElementById('fileLoop');

        let loadedFileName = '';

        fileInput.onchange = async function() {
            const file = this.files[0];
            if (!file) return;

            fileName.textContent = file.name;
            fileName.className = 'file-name loaded';
            loadedFileName = file.name;

            try {
                await Synth.loadFile(file);
                playFileBtn.className = 'btn-play-file show';
                fileCodeBtn.style.display = 'inline-block';
                fileControls.className = 'file-controls show';
                Synth.init();
                // Автоматически обновляем код в превью
                updateFileCode();
            } catch (err) {
                alert('Ошибка загрузки файла: ' + err.message);
            }
        };

        // Настройки файла
        fileVolume.oninput = function() {
            fileVolumeVal.textContent = parseFloat(this.value).toFixed(2);
            if (Synth.getBuffer()) {
                Synth.stopFile();
                Synth.playFile(parseFloat(fileVolume.value), parseFloat(fileRate.value), fileLoop.checked);
            }
        };

        fileRate.oninput = function() {
            fileRateVal.textContent = parseFloat(this.value).toFixed(2);
            if (Synth.getBuffer()) {
                Synth.stopFile();
                Synth.playFile(parseFloat(fileVolume.value), parseFloat(fileRate.value), fileLoop.checked);
            }
        };

        fileLoop.onchange = function() {
            if (Synth.getBuffer()) {
                Synth.stopFile();
                Synth.playFile(parseFloat(fileVolume.value), parseFloat(fileRate.value), this.checked);
            }
        };

        // Play файла
        playFileBtn.onclick = function() {
            Synth.init();
            Synth.playFile(parseFloat(fileVolume.value), parseFloat(fileRate.value), fileLoop.checked);
        };

        // ============================================================
        //  ГЕНЕРАЦИЯ КОДА ДЛЯ ЗАГРУЖЕННОГО ФАЙЛА
        // ============================================================
        function updateFileCode() {
            const buffer = Synth.getBuffer();
            if (!buffer) {
                fileCodeBtn.textContent = '📋 Нет звука';
                return;
            }
            const name = loadedFileName.replace(/\.[^/.]+$/, '').replace(/[^a-zA-Z0-9_]/g, '_');
            const vol = parseFloat(fileVolume.value);
            const rate = parseFloat(fileRate.value);
            const loop = fileLoop.checked;

            // Генерируем код для вставки в игру
            const code = `// Загруженный звук: ${loadedFileName}
function playCustomSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  // Загрузи звук в игру: помести audioBuffer в переменную
  // ВАЖНО: звук должен быть загружен заранее!
  // Пример: fetch('${loadedFileName}').then(r=>r.arrayBuffer()).then(buf=>ctx.decodeAudioData(buf)).then(buffer=>{...})
  // ИЛИ используй встроенный playBeep для синтеза
  // Для загруженного звука используй:
  // source = ctx.createBufferSource();
  // source.buffer = audioBuffer;
  // source.loop = ${loop};
  // source.playbackRate.value = ${rate};
  // const gain = ctx.createGain();
  // gain.gain.value = ${vol};
  // source.connect(gain);
  // gain.connect(ctx.destination);
  // source.start();
}
// ИЛИ используй синтезированный звук с этими параметрами:`;
            fileCodeBtn.textContent = '📋 Код';
            fileCodeBtn.dataset.code = code;
        }

        fileCodeBtn.onclick = function() {
            const code = this.dataset.code || `// Нет загруженного звука`;
            navigator.clipboard.writeText(code).then(() => {
                this.textContent = '✅';
                setTimeout(() => { this.textContent = '📋 Код'; }, 1200);
            });
            document.getElementById('codeOutput').textContent = code;
        };

        // ============================================================
        //  ГЕНЕРАЦИЯ КОДА ДЛЯ СИНТЕЗИРОВАННЫХ ЗВУКОВ
        // ============================================================
        function makeCode(id) {
            const s = state[id];
            const p = PRESETS.find(x => x.id === id);
            const name = p.codeName || p.id;
            if (id === 'spark') {
                return `function ${name}() { 
  playBeep(${s.freq}, ${s.duration}, '${s.type}', ${s.volume});
  setTimeout(() => playBeep(${Math.round(s.freq*0.78)}, ${(s.duration*1.2).toFixed(2)}, '${s.type}', ${(s.volume*0.9).toFixed(2)}), 80);
  setTimeout(() => playBeep(${Math.round(s.freq*0.57)}, ${(s.duration*1.4).toFixed(2)}, '${s.type}', ${(s.volume*0.8).toFixed(2)}), 180);
}`;
            }
            return `function ${name}() { playBeep(${s.freq}, ${s.duration}, '${s.type}', ${s.volume}); }`;
        }

        function makeAllCode() {
            let code = '// ===== Вставь в SoundContainer =====\n';
            code += '// Синтезированные звуки:\n';
            PRESETS.forEach(p => {
                const s = state[p.id];
                const name = p.codeName || p.id;
                if (p.id === 'spark') {
                    code += `\nfunction ${name}() { 
  playBeep(${s.freq}, ${s.duration}, '${s.type}', ${s.volume});
  setTimeout(() => playBeep(${Math.round(s.freq*0.78)}, ${(s.duration*1.2).toFixed(2)}, '${s.type}', ${(s.volume*0.9).toFixed(2)}), 80);
  setTimeout(() => playBeep(${Math.round(s.freq*0.57)}, ${(s.duration*1.4).toFixed(2)}, '${s.type}', ${(s.volume*0.8).toFixed(2)}), 180);
}\n`;
                } else {
                    code += `\nfunction ${name}() { playBeep(${s.freq}, ${s.duration}, '${s.type}', ${s.volume}); }`;
                }
            });

            // Добавляем код для загруженного файла, если есть
            const buffer = Synth.getBuffer();
            if (buffer) {
                const vol = parseFloat(fileVolume.value);
                const rate = parseFloat(fileRate.value);
                const loop = fileLoop.checked;
                const name = loadedFileName.replace(/\.[^/.]+$/, '').replace(/[^a-zA-Z0-9_]/g, '_');
                code += `\n\n// ===== Загруженный звук: ${loadedFileName} =====
// Для использования загруженного звука добавь в игру:
// 1. Создай переменную audioBuffer вне функций
// 2. Загрузи звук при старте игры:
// fetch('${loadedFileName}').then(r=>r.arrayBuffer()).then(buf=>ctx.decodeAudioData(buf)).then(buffer=>{ audioBuffer = buffer; });
// 3. Функция для воспроизведения:
function play${name}() {
  if (!audioBuffer) return;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const source = ctx.createBufferSource();
  source.buffer = audioBuffer;
  source.loop = ${loop};
  source.playbackRate.value = ${rate};
  const gain = ctx.createGain();
  gain.gain.value = ${vol};
  source.connect(gain);
  gain.connect(ctx.destination);
  source.start();
}`;
            }

            return code;
        }

        // Копировать один синтезированный
        document.querySelectorAll('.btn-copy').forEach(btn => {
            btn.onclick = function() {
                const id = this.dataset.id;
                const code = makeCode(id);
                navigator.clipboard.writeText(code).then(() => {
                    this.textContent = '✅';
                    this.classList.add('copied');
                    setTimeout(() => { this.textContent = '📋 Код';
                        this.classList.remove('copied'); }, 1000);
                });
                document.getElementById('codeOutput').textContent = code;
            };
        });

        // Копировать всё
        document.getElementById('copyAllBtn').onclick = function() {
            const code = makeAllCode();
            navigator.clipboard.writeText(code).then(() => {
                this.textContent = '✅';
                this.classList.add('copied');
                setTimeout(() => { this.textContent = '📋 Копировать всё';
                    this.classList.remove('copied'); }, 1200);
            });
            document.getElementById('codeOutput').textContent = code;
        };

        // Стартовый статус
        Synth.updateUI();

        console.log('🎹 Синтезатор + загрузчик загружен!');
        console.log('📁 Загрузи звуковой файл, настрой и получи код для вставки в игру.');
    </script>

</body>
